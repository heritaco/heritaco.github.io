    Experience:
      - name: Data Analyst at Mathematics Learning Center
        organization: Universidad de las Américas Puebla
        location: Puebla, Mexico
        date: Aug 2025 — Present
        highlights:
          - Constructed a standardized panel dataset; estimated tutoring effects using KDE imputation, within-class Z-scores, robust nonparametric inference, and bootstrap CIs.
          - Applied unsupervised learning to compare grade-distribution instances through KS based distributional features, generating diagnostics, effect-size summaries, and reports.
          - Built a one-click pipeline with batch scripts that install missing Miniconda, rerun analyses on new data, and regenerate all Python outputs and LaTeX reports automatically.
      - name: Quantitative Analyst
        organization: Actinver
        location: Mexico City, Mexico
        date: Jun 2025 — Dec 2025
        highlights:
          - Built automated portfolios from sentiment on news reports and regression forecasts with trend-engineered features; tested via walk-forward backtests and Bayesian parameter search.
          - Architected an Airflow ETL DAG with a Docker container to ingest intraday OHLCV/reference data into PostgreSQL for 500 tickers, parameterized to scale to arbitrary tickers.
          - Web-scraped the latest 100 news items per ticker and normalized metadata by publisher/journal to enable fast filtering, deduplication, and rapid analyst-facing news retrieval.

    Research & Software Projects:
      - name: Developer in Proximity Graphs Python Library
        date: Aug 2025 — Present
        location: Puebla, Mexico
        links: [{ label: PyPI, url: "https://pypi.org/project/proximitygraphs/" }]
        highlights:
          - Converted proximity-graph constructions from mathematical papers into reproducible, object-oriented Python code, structuring algorithms as modular classes across subpackages.
          - Reorganized the repository architecture for maintainability, enforcing PEP 8/Ruff style conventions and optimizing computational kernels with NumPy vectorization.
          - Implemented continuous-integration workflows in GitHub Actions to run Ruff, PyTest, and package-build checks across multiple Python versions before publishing releases to PyPI.
      - name: Unit-Region Factorization for Empty-Region Proximity Graphs
        date: Jun 2026 — Present
        location: Puebla, Mexico
        links:
          - { label: Portfolio, url: "https://heri-espino.github.io/papers/unit-region-factorization.html" }
          - { label: PDF, url: "https://heri-espino.github.io/papers/unit-region-factorization.pdf" }
        highlights:
          - Proved rigid-motion covariance and scale covariance for Euclidean-definable neighborhood kernels, yielding a dimensionless unit-region factorization.
          - Derived applications to γ-neighborhood lenses and empty-region graph kernels, establishing invariance conditions for Poisson and NHPP analytic formulas.
          - Implemented Monte Carlo membership checks for equivariance and scaling tests, validating β-skeleton and γ-graph constructions under invariant center-selection rules.
      - name: Volume Constants for Stepping–Stone Empty Regions in Rᵈ
        date: Jun 2026 — Present
        location: Puebla, Mexico
        links:
          - { label: Portfolio, url: "https://heri-espino.github.io/papers/stepping-stone.html" }
          - { label: PDF, url: "https://heri-espino.github.io/papers/stepping-stone-empty-regions.pdf" }
        highlights:
          - Proved a normalized 1D formula for the Lebesgue measure of the Stepping–Stone region using scale reduction, axial slicing, midpoint symmetry.
          - Derived special cases and built stable quadrature for high-dimensional stepping–stone constants, anchor checks, and limiting geometry across dimensions.
      - name: Optimal Smoothness Index and Regularization in Guerrero's Penalized Trends
        date: May 2025 — Present
        location: Puebla, Mexico
        links:
          - { label: Portfolio, url: "https://heri-espino.github.io/projects/sp500-trend-comparison.html" }
          - { label: PDF, url: "https://heri-espino.github.io/projects/sp500-trend-comparison.pdf" }
          - { label: GitHub, url: "https://github.com/heritaco/Trend-Estimation" }
        highlights:
          - Built a reproducible S&P 500 log-price trend pipeline using Guerrero smoothness, penalized least squares, cached solvers, temporal splits, metrics, and diagnostic plots.
          - Reused spectral solvers for matrix multiplication across smoothness grids and benchmarked HP, Whittaker, MA, ES, and polynomial baselines using RMSE and SMAPE.
      - name: Estimation of Latent Risk in the U.S. Market Using Representative Variables
        date: Jan 2023 — May 2023
        location: Puebla, Mexico
        links:
          - { label: Portfolio, url: "https://heri-espino.github.io/projects/latent-risk-us-market.html" }
          - { label: PDF, url: "https://heri-espino.github.io/projects/latent-risk-us-market.pdf" }
          - { label: GitHub, url: "https://github.com/heritaco/Estimation-of-latent-risk-in-the-U.S.-market-using-representative-variables" }
        highlights:
          - Built a latent U.S. market-risk index from VIX, WTI, gold, and DXY using a dynamic-factor model to extract common financial-stress variation across global risk proxies.
          - Smoothed the latent factor with Guerrero-calibrated penalized trends and analyzed inflation lags, crisis deviations, forecast bands, and regime shifts and tail-risk signals.
      - name: Privileged Template Priors for Mechanistic Interpretability in CNNs
        date: Dec 2025 — Present
        location: Puebla, Mexico
        links:
          - { label: Portfolio, url: "https://heri-espino.github.io/projects/cnn-primitive-bases.html" }
          - { label: PDF, url: "https://heri-espino.github.io/projects/cnn-primitive-bases.pdf" }
          - { label: GitHub, url: "https://github.com/heritaco/Privileged-Template-Priors-for-Mechanistic-Interpretability-in-CNNs" }
        highlights:
          - Trained CNNs with random, template-initialized, and frozen-template filters to test inductive bias, sample efficiency, feature reuse, and prior strength in controlled data.
          - Measured mechanistic identifiability using template-alignment scores, kernel visualizations, ablations, controlled patching, and class-level responses across classes.
      - name: Systemic Liquidity-Crisis Agent-Based Model
        date: Oct 2025 — Present
        location: Puebla, Mexico
        links:
          - { label: Portfolio, url: "https://heri-espino.github.io/projects/systemic-liquidity-abm.html" }
          - { label: PDF, url: "https://heri-espino.github.io/projects/systemic-liquidity-abm.pdf" }
          - { label: GitHub, url: "https://github.com/heritaco/Modelado-de-Crisis-de-Liquidez-Sistemica-en-Mercados-de-Opciones-mediante-ABM" }
        highlights:
          - Built an agent-based derivatives simulator with market participants, stochastic shocks, pricing rules, and margin calls under crisis scenarios.
          - Tracked liquidation cascades through volatility jumps, spread widening, agent health, stress networks, contagion indices, and network-fragility metrics across agent types.
      - name: Mathematical Notes on Random Variables as Vectors in L²
        date: Jun 2026 — Present
        location: Puebla, Mexico
        links:
          - { label: Portfolio, url: "https://heri-espino.github.io/notes/random-variables-as-vectors.html" }
          - { label: PDF, url: "https://heri-espino.github.io/notes/random-variables-as-vectors.pdf" }
        highlights:
          - Wrote formal L² notes framing random variables as Hilbert-space vectors, with expectation, variance, MSE, bias–variance, and regression error as projections.
          - Derived conditional expectation, tower property, Chapman–Kolmogorov, and total variance as nested projection identities in L² with geometric diagrams and examples.
      - name: Academic Assistant in Matrix Theory Course
        date: Jan 2023 — May 2023
        location: Puebla, Mexico
        organization: "Universidad de las Américas Puebla; Professor: Dr. Hugo Villanueva Méndez"
        highlights:
          - Built reproducible LaTeX Beamer materials with theorem environments, TikZ diagrams, spectral figures, structured handouts, and clean source files for student use.
          - Standardized notation and visual assets for lectures on linear maps, eigenspaces, diagonalization, decompositions, and matrix factorizations for proof-based teaching.

